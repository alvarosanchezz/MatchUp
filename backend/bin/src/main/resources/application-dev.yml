spring:
  # ── SQL logging en dev ──
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ── Logs de nivel DEBUG para SQL y Flyway en dev ──
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: DEBUG
    com.matchup: DEBUG
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(%-40.40logger{39}){cyan} : %msg%n"
