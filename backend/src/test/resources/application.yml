spring:
  profiles:
    active: ""
  datasource:
    url: jdbc:postgresql://localhost:5432/matchup_test
    username: testuser
    password: testpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 2525
    username: ""
    password: ""
    test-connection: false

server:
  port: 8080

app:
  jwt:
    secret: test-secret-key-for-integration-tests-must-be-at-least-256-bits-long-ok
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

logging:
  level:
    root: WARN
    com.matchup: INFO
    org.flywaydb: INFO
