spring:
  application:
    name: matchup-backend
  profiles:
    active: dev   # sobreescribir con -Dspring.profiles.active=prod en producción

  # ── DataSource ──────────────────────────────────────────────────────────────
  # Acepta SPRING_DATASOURCE_URL (env var nativa de Spring Boot) o DB_URL como alias.
  # Neon: jdbc:postgresql://ep-xxx.eu-west-2.aws.neon.tech/neondb?sslmode=require
  # Docker-compose: jdbc:postgresql://db:5432/matchup_db  (sin SSL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/matchup_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:matchup_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASS:matchup_pass}}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MatchUpPool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000

  # ── JPA ──
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gestiona el esquema; JPA sólo valida
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false

  # ── Mail (configurar en el perfil o con env vars) ──
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── Servidor ──
# Railway inyecta PORT; SERVER_PORT es para despliegues propios; default 8080
server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /

# ── JWT ──
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-this-in-production-must-be-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}          # 15 min
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}  # 7 días
  cors:
    # Lista separada por comas de orígenes permitidos (soporta patrones con *)
    # En producción sobreescribir con la URL real de Vercel
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost,https://*.vercel.app}

# ── Springdoc ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
