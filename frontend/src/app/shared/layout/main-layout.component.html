<mat-sidenav-container class="main-container">

  <!-- ── Sidenav ──────────────────────────────────────────────────────── -->
  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [(opened)]="sidenavOpen"
    class="sidenav"
  >
    <div class="sidenav-header flex items-center gap-3 px-4 py-5">
      <img src="logo.svg" alt="MatchUp" class="h-8" />
    </div>

    <mat-divider />

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="nav-active"
          (click)="isMobile && sidenav.close()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <!-- ── Main content ─────────────────────────────────────────────────── -->
  <mat-sidenav-content>

    <!-- Toolbar -->
    <mat-toolbar color="primary" class="toolbar-sticky">
      <button mat-icon-button (click)="toggleSidenav()" aria-label="Abrir menú">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="font-bold text-lg ml-2 flex-1">MatchUp</span>

      <!-- User menu trigger -->
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
        @if (userPhoto) {
          <img [src]="userPhoto" alt="foto" class="avatar-img" />
        } @else {
          <span class="avatar-initials">{{ userInitial }}</span>
        }
        <span class="ml-2 hidden sm:inline">{{ userName }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <a mat-menu-item routerLink="/profile">
          <mat-icon>person</mat-icon>
          <span>Mi perfil</span>
        </a>
        <mat-divider />
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <!-- Page content -->
    <main class="p-4 md:p-6">
      <router-outlet />
    </main>

  </mat-sidenav-content>
</mat-sidenav-container>
