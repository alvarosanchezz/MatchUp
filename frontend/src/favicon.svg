<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="56%" r="56%">
      <stop offset="0%"   stop-color="#a3e635" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep dark rounded square -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- Lime glow bloom -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Hexagonal badge outline — sports shield feel -->
  <path d="M16 2.5L28.5 9.25V22.75L16 29.5L3.5 22.75V9.25Z"
