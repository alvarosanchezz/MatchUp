<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="lime" x1="6" y1="9" x2="26" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d9f99d"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="32" height="32" rx="8" stroke="#a3e635" stroke-width="0.6" stroke-opacity="0.18" fill="none"/>

  <!-- Lightning bolt — speed / competition -->
  <path d="M19 3L9 17.5H16L13 29L23 14.5H16Z"
        fill="url(#lime)"
        filter="url(#glow)"
        stroke="#a3e635" stroke-width="0.3" stroke-opacity="0.5"
        stroke-linejoin="round"/>
</svg>
